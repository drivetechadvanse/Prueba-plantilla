<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive MX - Logística</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .btn-primary { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; font-size: 0.75rem; background: #ef4444; color: white; border-radius: 0.75rem; padding: 0.75rem 1.5rem; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.3); background: #dc2626; }
        .card-glass { background: white; border: 1px solid #e2e8f0; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
        .input-field { font-size: 0.85rem; background: #f1f5f9; border-radius: 0.75rem; padding: 0.85rem 1rem; width: 100%; border: 2px solid transparent; transition: all 0.2s; font-weight: 600; }
        .input-field:focus { background: white; border-color: #ef4444; outline: none; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBExKX8fzOcXbFMT9lBQBldt_5AXr9FjSk",
            authDomain: "drive-mx-42afe.firebaseapp.com",
            projectId: "drive-mx-42afe",
            storageBucket: "drive-mx-42afe.firebasestorage.app",
            messagingSenderId: "144683559774",
            appId: "1:144683559774:web:b38f43f4f5eb3d0c637dcf",
            measurementId: "G-4FQD4F54N0"
        };

        window.firebaseConfig = firebaseConfig;
        window.FirebaseSDK = { initializeApp, getAuth, onAuthStateChanged, signInAnonymously, getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc, query };
    </script>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect } = React;
        const fbase = window.FirebaseSDK;
        
        const Icons = {
            Truck: ({size=16}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-5l-4-4h-3v10h3Z"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg>,
            Trash: ({size=14}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
            LogOut: ({size=14}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/></svg>
        };

        const STEPS = ['Recolectado', 'Procesando', 'En Camino', 'Entregado'];
        const appId = "drive-mx-42afe";

        const App = () => {
            const [view, setView] = useState('tracking');
            const [fbUser, setFbUser] = useState(null);
            const [sessionUser, setSessionUser] = useState(null);
            const [pkgs, setPkgs] = useState([]);
            const [ops, setOps] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [trackingResult, setTrackingResult] = useState(null);
            const [loginForm, setLoginForm] = useState({ u: '', p: '' });
            const [pkgForm, setPkgForm] = useState({ id: '', o: '', d: '', op: '' });
            const [staffForm, setStaffForm] = useState({ u: '', p: '', n: '' });
            const [showStaffModal, setShowStaffModal] = useState(false);

            useEffect(() => {
                const app = fbase.initializeApp(window.firebaseConfig);
                const auth = fbase.getAuth(app);
                fbase.signInAnonymously(auth);
                return fbase.onAuthStateChanged(auth, setFbUser);
            }, []);

            useEffect(() => {
                if (!fbUser) return;
                const db = fbase.getFirestore();
                const pkgCol = fbase.collection(db, 'artifacts', appId, 'public', 'data', 'packages');
                const opCol = fbase.collection(db, 'artifacts', appId, 'public', 'data', 'operators');
                
                const unsubPkgs = fbase.onSnapshot(pkgCol, (s) => {
                    const l = []; s.forEach(d => l.push(d.data())); 
                    setPkgs(l);
                });

                const unsubOps = fbase.onSnapshot(opCol, (s) => {
                    const l = []; s.forEach(d => l.push(d.data()));
                    // NUEVOS ACCESOS CONFIGURADOS AQUÍ
                    if (!l.find(x => x.id === 'admin central')) {
                        l.push({ id: 'admin central', pass: 'arturo9271', name: 'Admin Central', role: 'admin' });
                    }
                    setOps(l);
                });

                return () => { unsubPkgs(); unsubOps(); };
            }, [fbUser]);

            const saveDoc = async (col, id, data) => {
                const db = fbase.getFirestore();
                await fbase.setDoc(fbase.doc(db, 'artifacts', appId, 'public', 'data', col, id), data);
            };

            const deletePkg = async (id) => {
                const db = fbase.getFirestore();
                await fbase.deleteDoc(fbase.doc(db, 'artifacts', appId, 'public', 'data', 'packages', id));
            };

            const deleteOp = async (id) => {
                if(id === 'admin central') return; // Evita borrar al admin principal
                const db = fbase.getFirestore();
                await fbase.deleteDoc(fbase.doc(db, 'artifacts', appId, 'public', 'data', 'operators', id));
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const match = ops.find(o => o.id.toLowerCase() === loginForm.u.toLowerCase() && String(o.pass) === String(loginForm.p));
                if (match) { 
                    setSessionUser(match); 
                    setView(match.role === 'admin' ? 'admin' : 'operator'); 
                } else { 
                    alert("Credenciales incorrectas."); 
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="h-16 bg-white border-b border-slate-200 px-6 flex items-center justify-between sticky top-0 z-50">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('tracking')}>
                            <div className="w-9 h-9 bg-red-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-red-100">
                                <Icons.Truck size={18} />
                            </div>
                            <span className="font-extrabold text-sm tracking-tight">DRIVE <span className="text-red-500">MX</span></span>
                        </div>
                        {sessionUser ? (
                            <div className="flex items-center gap-4">
                                <div className="text-right hidden sm:block">
                                    <p className="text-[10px] font-bold leading-none">{sessionUser.name}</p>
                                    <p className="text-[8px] font-black text-red-500 uppercase">{sessionUser.role}</p>
                                </div>
                                <button onClick={() => {setSessionUser(null); setView('tracking');}} className="p-2 text-slate-400"><Icons.LogOut /></button>
                            </div>
                        ) : (
                            <button onClick={() => setView('login')} className="text-[9px] font-black uppercase text-slate-400 tracking-widest">Acceso Staff</button>
                        )}
                    </header>

                    <main className="flex-grow p-6 flex flex-col items-center">
                        {view === 'tracking' && (
                            <div className="w-full max-w-xl py-10 space-y-8 animate-slide">
                                <div className="text-center">
                                    <h1 className="text-4xl font-black text-slate-900 tracking-tight mb-2">Rastrea tu <span className="text-red-500">Envío</span></h1>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Ingresa tu número de guía</p>
                                </div>
                    
                                <div className="bg-white p-2 rounded-2xl border-2 border-slate-100 shadow-sm flex gap-2">
                                    <input className="flex-grow bg-transparent px-4 text-sm font-bold uppercase outline-none" placeholder="EJ: MX-12345" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                                    <button onClick={() => {
                                        const p = pkgs.find(x => x.id === searchQuery.toUpperCase().trim());
                                        setTrackingResult(p || null);
                                        if(!p) alert("No se encontró el paquete.");
                                    }} className="btn-primary">Buscar</button>
                                </div>

                                {!trackingResult && (
                                    <div className="w-full mt-6 animate-slide">
                                        <div className="relative overflow-hidden rounded-[2rem] shadow-2xl shadow-red-100 border-4 border-white bg-white">
                                            <img src="repartidora.jpg" alt="Drive MX" className="w-full h-auto object-cover" />
                                        </div>
                                    </div>
                                )}

                                {trackingResult && (
                                    <div className="card-glass p-8 space-y-8 animate-slide">
                                        <div className="flex justify-between items-start">
                                            <div><p className="text-[9px] font-black text-slate-400 uppercase mb-1">Guía</p><h2 className="text-3xl font-black text-red-600">#{trackingResult.id}</h2></div>
                                            <div className="text-right"><p className="text-[9px] font-black text-slate-400 uppercase mb-1">Estatus</p><p className="px-3 py-1 bg-red-50 text-red-600 rounded-full text-[10px] font-black uppercase">{trackingResult.status}</p></div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 bg-slate-50 p-5 rounded-2xl">
                                            <div><p className="text-[8px] font-black text-slate-400 uppercase">Origen</p><p className="text-[11px] font-bold uppercase">{trackingResult.o}</p></div>
                                            <div className="border-l border-slate-200 pl-4"><p className="text-[8px] font-black text-slate-400 uppercase">Destino</p><p className="text-[11px] font-bold uppercase">{trackingResult.d}</p></div>
                                        </div>
                                        <div className="flex justify-between relative px-2">
                                            {STEPS.map((s, i) => (
                                                <div key={i} className="flex flex-col items-center gap-2 z-10">
                                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-bold ${i <= trackingResult.currentStep ? 'bg-red-500 text-white shadow-lg' : 'bg-slate-100 text-slate-300'}`}>{i+1}</div>
                                                    <span className={`text-[8px] font-black uppercase text-center w-14 ${i <= trackingResult.currentStep ? 'text-slate-900' : 'text-slate-300'}`}>{s}</span>
                                                </div>
                                            ))}
                                            <div className="absolute top-4 left-0 w-full h-[2px] bg-slate-100 -z-0"></div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="w-full max-w-5xl space-y-8 animate-slide">
                                <div className="flex justify-between items-end">
                                    <div><h1 className="text-3xl font-black">Panel <span className="text-red-500">Admin</span></h1><p className="text-[10px] font-bold text-slate-400 uppercase">Gestión Central</p></div>
                                    <button onClick={() => setShowStaffModal(true)} className="btn-primary">Registrar Operador</button>
                                </div>
                                
                                <div className="grid md:grid-cols-3 gap-8">
                                    <div className="md:col-span-1 card-glass p-6 space-y-6">
                                        <h2 className="text-[10px] font-black uppercase tracking-widest text-slate-400">Nuevo Envío</h2>
                                        <form onSubmit={(e) => { e.preventDefault(); const n = { ...pkgForm, id: pkgForm.id.toUpperCase(), status: 'Recolectado', currentStep: 0 }; saveDoc('packages', n.id, n); setPkgForm({ id: '', o: '', d: '', op: '' }); }} className="space-y-4">
                                            <input required className="input-field uppercase" placeholder="NÚMERO DE GUÍA" value={pkgForm.id} onChange={e => setPkgForm({...pkgForm, id: e.target.value})} />
                                            <input required className="input-field uppercase" placeholder="ORIGEN" value={pkgForm.o} onChange={e => setPkgForm({...pkgForm, o: e.target.value})} />
                                            <input required className="input-field uppercase" placeholder="DESTINO" value={pkgForm.d} onChange={e => setPkgForm({...pkgForm, d: e.target.value})} />
                                            <select required className="input-field" value={pkgForm.op} onChange={e => setPkgForm({...pkgForm, op: e.target.value})}>
                                                <option value="">ASIGNAR OPERADOR</option>
                                                {ops.filter(o => o.role === 'operador').map(o => <option key={o.id} value={o.id}>{o.name}</option>)}
                                            </select>
                                            <button type="submit" className="w-full btn-primary h-12">Crear Guía</button>
                                        </form>
                                    </div>
                                    
                                    <div className="md:col-span-2 space-y-8">
                                        <div className="card-glass overflow-hidden">
                                            <div className="bg-slate-50 border-b border-slate-100 px-6 py-4">
                                                <h2 className="text-[10px] font-black uppercase tracking-widest text-slate-400">Envíos Activos</h2>
                                            </div>
                                            <table className="w-full text-left">
                                                <tbody className="divide-y divide-slate-50">
                                                    {pkgs.map(p => (
                                                        <tr key={p.id} className="text-[10px] font-bold text-slate-600">
                                                            <td className="px-6 py-4 text-red-600 font-black">#{p.id}</td>
                                                            <td className="px-6 py-4">{p.o} → {p.d}</td>
                                                            <td className="px-6 py-4"><span className="px-2 py-1 bg-slate-100 rounded-full text-[8px] uppercase">{p.status}</span></td>
                                                            <td className="px-6 py-4 text-right"><button onClick={() => deletePkg(p.id)} className="text-slate-300 hover:text-red-500"><Icons.Trash /></button></td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>

                                        <div className="card-glass overflow-hidden">
                                            <div className="bg-slate-50 border-b border-slate-100 px-6 py-4">
                                                <h2 className="text-[10px] font-black uppercase tracking-widest text-slate-400">Operadores Registrados</h2>
                                            </div>
                                            <table className="w-full text-left">
                                                <thead className="bg-white border-b border-slate-50">
                                                    <tr className="text-[8px] font-black uppercase text-slate-400">
                                                        <th className="px-6 py-3">Nombre</th>
                                                        <th className="px-6 py-3">Usuario</th>
                                                        <th className="px-6 py-3 text-right">Acción</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-50">
                                                    {ops.filter(o => o.role === 'operador').map(o => (
                                                        <tr key={o.id} className="text-[10px] font-bold text-slate-600">
                                                            <td className="px-6 py-4">{o.name}</td>
                                                            <td className="px-6 py-4 font-mono text-slate-400">{o.id}</td>
                                                            <td className="px-6 py-4 text-right"><button onClick={() => deleteOp(o.id)} className="text-slate-300 hover:text-red-500"><Icons.Trash /></button></td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'operator' && (
                            <div className="w-full max-w-xl space-y-8 animate-slide">
                                <div><h1 className="text-3xl font-black uppercase tracking-tight">Mis <span className="text-red-500">Asignaciones</span></h1><p className="text-[10px] font-bold text-slate-400 uppercase">Ruta Activa</p></div>
                                <div className="space-y-4">
                                    {pkgs.filter(p => p.op === sessionUser.id).map(p => (
                                        <div key={p.id} className="card-glass p-6 space-y-6">
                                            <div className="flex justify-between items-center"><h3 className="text-xl font-black text-red-600">#{p.id}</h3><span className="text-[9px] font-black uppercase text-slate-400">{p.o} → {p.d}</span></div>
                                            <div className="grid grid-cols-2 gap-2">
                                                {STEPS.map((s, i) => (
                                                    <button key={s} onClick={() => saveDoc('packages', p.id, { ...p, status: s, currentStep: i })} className={`p-3 rounded-xl text-[9px] font-black uppercase border-2 transition-all ${p.status === s ? 'bg-red-500 border-red-500 text-white shadow-lg' : 'border-slate-100 text-slate-400'}`}>{s}</button>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'login' && (
                            <div className="w-full max-w-sm py-20 animate-slide">
                                <div className="card-glass p-10 space-y-8">
                                    <h2 className="text-center text-xl font-black uppercase tracking-widest">Panel Staff</h2>
                                    <form onSubmit={handleLogin} className="space-y-4">
                                        <input required className="input-field" placeholder="USUARIO" onChange={e => setLoginForm({...loginForm, u: e.target.value})} />
                                        <input required type="password" className="input-field" placeholder="CONTRASEÑA" onChange={e => setLoginForm({...loginForm, p: e.target.value})} />
                                        <button type="submit" className="w-full btn-primary h-12">Entrar</button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </main>

                    {showStaffModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
                            <div className="card-glass max-w-sm w-full p-10 animate-slide">
                                <h2 className="text-sm font-black text-center uppercase mb-8">Nuevo Operador</h2>
                                <form onSubmit={(e) => { e.preventDefault(); const newOp = { ...staffForm, id: staffForm.u, role: 'operador', pass: staffForm.p, name: staffForm.n }; saveDoc('operators', newOp.id, newOp); setShowStaffModal(false); }} className="space-y-4">
                                    <input required className="input-field" placeholder="NOMBRE COMPLETO" onChange={e => setStaffForm({...staffForm, n: e.target.value})} />
                                    <input required className="input-field uppercase" placeholder="ID (EJ: OP-01)" onChange={e => setStaffForm({...staffForm, u: e.target.value})} />
                                    <input required className="input-field" placeholder="CONTRASEÑA" onChange={e => setStaffForm({...staffForm, p: e.target.value})} />
                                    <button type="submit" className="w-full btn-primary h-12">Guardar Registro</button>
                                    <button type="button" onClick={() => setShowStaffModal(false)} className="w-full text-[9px] font-black text-slate-400 uppercase">Cancelar</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
